version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bk_connect
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./api
    container_name: nest-api
    restart: always
    depends_on:
      - postgres
      - minio

    env_file:
      - ./api/.env.development

    ports:
      - "4000:4000"

    volumes:
      - ./api:/app

    command: npm run start:dev

  app:
    build:
      context: ./app
    container_name: next-app
    restart: always
    depends_on:
      - api

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000

    ports:
      - "3001:3000"

    volumes:
      - ./app:/app

    command: npm run dev

volumes:
  postgres_data:
  minio_data:
